name: Test and Release

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-**'
  pull_request: {}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: ioBroker/testing-action-check@v2
        with:
          node-version: '24.x'
          lint: true

  adapter-tests:
    needs: [check-and-lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}

  deploy:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [check-and-lint, adapter-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Create GitHub release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm pack
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" "iobroker.dnp3-${GITHUB_REF_NAME#v}.tgz" --clobber
